# Example Hyprland binds for Clipsy.
# If you do not install the package, replace `clipsy` with:
#   cd /home/arctic/clipping && python -m clipsy

bind = SUPER, F9, exec, clipsy clip
bind = SUPER, F10, exec, clipsy record-toggle
bind = SUPER, F11, exec, clipsy reload

# Clip notifications use `hyprctl notify` (compositor-level rendering).
# They appear above fullscreen windows automatically — no windowrule needed.
# The popup shows "✔  Saved the last N seconds." and auto-dismisses after 5s.
